
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex justify-center items-center">
    <form method="POST" class="bg-white p-8 rounded shadow w-96">
        <h1 class="text-2xl font-bold mb-4">Login</h1>
        <input type="email" name="email" placeholder="Email" class="w-full p-2 border rounded mb-4" required>
        <input type="password" name="password" placeholder="Password" class="w-full p-2 border rounded mb-4" required>
        <button type="submit" class="w-full bg-green-600 text-white p-2 rounded">Login</button>
    </form>
</body>
</html>
